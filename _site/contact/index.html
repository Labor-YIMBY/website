<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact | Labor YIMBY</title>
<meta name="description" content="A non-factional, non-affiliated advocacy group within the Australian Labor Party fighting for housing abundance.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/assets/css/main.css">
<link rel="canonical" href="https://laboryimby.org.au/contact/">
<link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">

</head>
<body>
  <header class="site-header">
  <div class="container">
    <a href="/" class="site-logo">
      <span class="logo-icon"><svg width="3rem" height="3rem" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4 L5 13 L8 13 L8 17 L16 17 L16 13 L19 13 Z"/></svg></span>
      <span class="logo-text">Labor <strong>YIMBY</strong></span>
    </a>
    <button class="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/about/">About</a>
      <a href="/articles/">Articles</a>
      <a href="/faq/">FAQ</a>
      <a href="/join/" class="nav-cta">Join</a>
      <a href="/contact/" class="active">Contact</a>
    </nav>
  </div>
</header>

  <main>
    <section class="contact-section">
  <div class="container">
    <h1>Contact us</h1>
    <div class="contact-grid">
      <div>
        <form class="contact-form" action="https://formspree.io/f/meedqlvz" method="POST">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required="" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required="" />
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" name="subject">
              <option value="">Select a topic...</option>
              <option value="membership">Membership enquiry</option>
              <option value="chapter">Starting a chapter</option>
              <option value="media">Media enquiry</option>
              <option value="policy">Policy question</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required=""></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>
      <div class="contact-info">
        <div class="contact-card">
          <h3>Social</h3>
          <p>
            <a href="https://twitter.com/LaborYIMBY" target="_blank" rel="noopener">Twitter / X</a><br />
            <a href="https://facebook.com/LaborYIMBY" target="_blank" rel="noopener">Facebook</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>

  </main>
  <footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <a href="/" class="footer-logo">
          <span class="logo-icon"><svg width="3rem" height="3rem" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4 L5 13 L8 13 L8 17 L16 17 L16 13 L19 13 Z"/></svg></span>
          <span class="logo-text">Labor <strong>YIMBY</strong></span>
        </a>
        <p>Building the political will for more homes. A non-factional, non-affiliated advocacy group within the Australian Labor Party.</p>
      </div>
      <div class="footer-social">
        <h4>Connect</h4>
        <a href="https://twitter.com/LaborYIMBY" target="_blank" rel="noopener">Twitter / X</a>
        <a href="https://facebook.com/LaborYIMBY" target="_blank" rel="noopener">Facebook</a>
        <a href="/contact/">Contact Us</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Labor YIMBY.</p>
    </div>
  </div>
</footer>

  <script src="/assets/js/main.js"></script>

</body>
</html>
