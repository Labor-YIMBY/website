---
layout: default
---

<article class="blog-post">
  <div class="container">
    <div class="post-header">
      <h1>{{ page.title }}</h1>
      <p class="post-date">{{ page.date | date: "%d %B %Y" }}</p>
    </div>
    <div class="post-content">
      {{ content }}
    </div>
  </div>
</article>
